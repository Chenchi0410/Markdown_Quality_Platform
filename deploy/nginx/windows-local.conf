worker_processes 1;

error_log logs/md-platform-error.log info;
pid logs/md-platform-nginx.pid;

events {
    worker_connections 1024;
}

http {
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 550m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    upstream portal_dev {
        server 127.0.0.1:5174;
    }

    upstream evaluation_app {
        server 127.0.0.1:8000;
    }

    upstream dataset_builder_app {
        server 127.0.0.1:8001;
    }

    upstream syntax_frontend_dev {
        server 127.0.0.1:5173;
    }

    upstream syntax_api {
        server 127.0.0.1:3000;
    }

    server {
        listen 80;
        server_name localhost 127.0.0.1;

        access_log logs/md-platform-access.log;

        location = /evaluation {
            return 308 /evaluation/;
        }

        location /evaluation/ {
            proxy_pass http://evaluation_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
        }

        location /api/evaluation/ {
            proxy_pass http://evaluation_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            proxy_read_timeout 600s;
        }

        location = /dataset-builder {
            return 308 /dataset-builder/;
        }

        location /dataset-builder/ {
            proxy_pass http://dataset_builder_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
        }

        location /api/dataset-builder/ {
            proxy_pass http://dataset_builder_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            proxy_read_timeout 600s;
        }

        location = /syntax-check {
            return 308 /syntax-check/;
        }

        location /syntax-check/ {
            proxy_pass http://syntax_frontend_dev;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 600s;
        }

        location /api/syntax/ {
            proxy_pass http://syntax_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering off;
            proxy_read_timeout 600s;
        }

        location / {
            proxy_pass http://portal_dev;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 600s;
        }
    }
}
